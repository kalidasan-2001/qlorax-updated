name: Reproducibility Module CI

on:
  workflow_dispatch:
  push:
    paths:
      - "reproducibility/**"
      - ".github/workflows/repro-module-ci.yml"
  pull_request:
    paths:
      - "reproducibility/**"
      - ".github/workflows/repro-module-ci.yml"

jobs:
  reproducibility-module:
    name: Repro Module Isolated Check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONHASHSEED: "42"
      CUDA_VISIBLE_DEVICES: ""
      CUBLAS_WORKSPACE_CONFIG: ":4096:8"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pinned reproducibility dependencies (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir \
            numpy==1.26.4 \
            pyyaml==6.0.2 \
            safetensors==0.4.5 \
            datasets==2.19.2 \
            accelerate==0.33.0 \
            transformers==4.44.2 \
            peft==0.12.0

      - name: Preflight checks (required files)
        run: |
          test -f reproducibility/configs/repro_config_ci.yaml
          test -f reproducibility/configs/fixed_prompts.jsonl
          test -f reproducibility/scripts/repro_utils.py
          test -f reproducibility/scripts/run_repro_train.py
          test -f reproducibility/scripts/compare_runs.py
          test -f reproducibility/scripts/run_full_repro_experiment.py

      - name: Run full isolated reproducibility experiment
        id: repro
        run: |
          set +e
          python reproducibility/scripts/run_full_repro_experiment.py --config reproducibility/configs/repro_config_ci.yaml --experiment-name gha_repro_${GITHUB_RUN_ID}
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

          # Pass/fail contract:
          # 0 => pass
          # 2 => reproducibility mismatch (fail)
          # other nonzero => runtime/config error (fail)
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "Reproducibility check PASSED"
            exit 0
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "::error::Reproducibility mismatch detected."
            exit 1
          else
            echo "::error::Reproducibility experiment failed with exit code $EXIT_CODE."
            exit "$EXIT_CODE"
          fi

      - name: Upload reproducibility artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-module-${{ github.run_id }}
          path: |
            reproducibility/outputs/**
            reproducibility/manifests/**
          retention-days: 30
